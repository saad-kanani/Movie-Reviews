syntax = "proto3";

package review;

service ReviewService {
  rpc AddReview (AddReviewRequest) returns (ReviewResponse);
  rpc GetReviewsByMovie (GetReviewsByMovieRequest) returns (ReviewListResponse);
  rpc GetReviewsByUser (GetReviewsByUserRequest) returns (ReviewListResponse);
}

message AddReviewRequest {
  int32 user_id = 1;
  int32 movie_id = 2;
  int32 rating = 3;        // 1 to 5
  string comment = 4;
}

message GetReviewsByMovieRequest {
  int32 movie_id = 1;
}

message GetReviewsByUserRequest {
  int32 user_id = 1;
}

message ReviewResponse {
  int32 id = 1;
  int32 user_id = 2;
  int32 movie_id = 3;
  int32 rating = 4;
  string comment = 5;
  string created_at = 6;
}

message ReviewListResponse {
  repeated ReviewResponse reviews = 1;
}